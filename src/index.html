<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo List</title>
</head>
<body>
  <div id="content">
    
  
    <nav>
      <div class="sortProjects">
        
        <p>Show Only Project Title:</p>
        <button id="defaultButton">Default/All</button>
        <div id="projectList"></div>
        
        <p>Show Only Priority:</p>
        <button id="priorityLowButton">Low</button>
        <button id="priorityMediumButton">Medium</button>    
        <button id="priorityHighButton">High</button>

      </div>
      
   <form id="todoForm">
     <h2>Add a Todo!</h2>
    <hr>
    <label for="day">When</label>
    <input type="date" id="day">
    <hr>
    <label for="priority">Priority</label>
    <select name="priority" id="priority">
      <option value="" disabled selected>Select priority</option>
      <option class="priority-low" value='low'>Low</option>
      <option class="priority-medium" value='medium'>Medium</option>
      <option class="priority-high" value='high'>High</option>
    </select>
    <p id="priorityError" class="form-error hidden"></p>
    <hr>
    <label for="project">Project</label>
    <select name="project" id="project">
       <option value="" disabled selected>Select project</option>
      <option value='personalImprovement'>Personal Improvement</option>
      <option value='houseWork'>House Work</option>
      <option value='skills'>Skills</option>
      <option value='important'>Important</option>
    </select>
    <p>Or type a new project name:</p>
    <input type="text" id="newProject" name="newProject" placeholder="New Project Name">
    <p id="projectError" class="form-error hidden"></p>

<hr>

    <label for='todo'>What To Do</label>
    <input type='text' id="todo" name="todo">
    <p id="descriptionError" class="form-error hidden"></p>
    <hr>
    <label for="time">Choose a time:</label>
    <input type="time" id="time" name="time">
    
    <button type="submit" id="submitButton">+ Add to List +</button>
  </form>

  
  
  </nav>
   <div class="rightContainer">
 <header>
  <h1>Todo List</h1>

</header>
  <div class="days">
  <h2 class="day">Today</h2>
  <h2 class="day">Tomorrow</h2>
  <h2 class="day">Coming Up</h2>
  <h2 class="day">Later</h2>
  <h2 class="day">Anytime</h2>
</div>
<div class="verticalContainer">
  <main>
  
      <div id="today" class="dayArea"></div>
      <div id="tomorrow" class="dayArea"></div>
      <div id="comingUp" class="dayArea"></div>
      <div id="later" class="dayArea"></div>
      <div id="anytime" class="dayArea"></div>
      
    </main>
<div class="overdue">
  <span class="overdue-title">! Overdue !</span><hr>
  <div id="overdue">
    
  </div>
</div>
</div>
  </div>
  
</body>
</html>
