<!doctype html><html lang="en"><head><meta charset="UTF-8"><title>Todo List</title><script defer="defer" src="./main.js"></script></head><body><div id="content"><nav><form id="todoForm"><h2 class="formTitle">Add a Todo!</h2><hr><label for="day">Day:</label> <input type="date" id="day" name="day"><hr><label for="priority">Priority:</label> <select name="priority" id="priority"><option value="" disabled="disabled" selected="selected">Select priority</option><option class="priority-low" value="low">Low</option><option class="priority-medium" value="medium">Medium</option><option class="priority-high" value="high">High</option></select><p id="priorityError" class="form-error hidden"></p><hr><label for="project">Select Project:</label> <select name="project" id="project"><option value="" disabled="disabled" selected="selected">Select project</option><option value="personalImprovement">Personal Improvement</option><option value="houseWork">House Work</option><option value="skills">Skills</option><option value="important">Important</option></select> <label for="newProject">Or create project:</label> <input id="newProject" name="newProject" placeholder="New Project Name"><p id="projectError" class="form-error hidden"></p><hr><label for="todo">What To Do:</label> <textarea id="todo" name="todo"></textarea><p id="descriptionError" class="form-error hidden"></p><hr><label for="time">Choose a time:</label> <input type="time" id="time" name="time"> <button type="submit" id="submitButton">+ Add to List +</button></form><div class="sortProjects"><h2 class="sortTodoTitle">Sort Todos</h2><hr><button id="defaultButton" type="button">Default/All</button><p>Show Project:</p><div id="projectList"></div><p>Show Priority:</p><button id="priorityLowButton" type="button">Low</button> <button id="priorityMediumButton" type="button">Medium</button> <button id="priorityHighButton" type="button">High</button></div></nav><div class="rightContainer"><header><h1>Todo List</h1></header><div class="days"><h2 class="day">Today</h2><h2 class="day">Tomorrow</h2><h2 class="day">Coming Up</h2><h2 class="day">Later</h2><h2 class="day">Anytime</h2></div><div class="verticalContainer"><main><div id="today" class="dayArea"></div><div id="tomorrow" class="dayArea"></div><div id="comingUp" class="dayArea"></div><div id="later" class="dayArea"></div><div id="anytime" class="dayArea"></div></main><div class="overdue"><span class="overdue-title">! Overdue !</span><hr><div id="overdue"></div></div></div></div></div></body></html>
